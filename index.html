<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physic Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>The physics engine</h1>

    <div id="inputarea">
        <p>
            <label for="posX">PozitiaX</label>
            <input type="number" name="posX" id="posX">

            <label for="posY">PozitiaY</label>
            <input type="number" name="posY" id="posY">

            <label for="masa">Masa Particulei</label>
            <input type="number" name="masa" id="masa">

            <label for="sarcina_electrica">Sarcina Electrica a Particulei</label>
            <input type="number" name="sarcina_electrica" id="sarcina">

            <label for="eFix">Este Particula Fixa?</label>
            <input type="checkbox" name="eFix" id="eFix">

            <label for="vitX">Viteza Initiala X</label>
            <input type="number" name="vitX" id="vitX">

            <label for="vitY">Viteza Initiala Y</label>
            <input type="number" name="vitY" id="vitY">

            <button onclick="addParticle()">Adauga Particula</button>


            
        </p>
        <p>
            <label for="timespeed">Cat de repede ruleaza simularea</label>
            <input type="range" name="timespeed" id="timespeed" min="0.01" max="10.0">
        </p>
        <p>
            <button onclick="start()">Start</button>
            <button onclick="stop()">Stop</button>
        </p>
        <div id="listarea"></div>
    </div>

    <canvas id="canvas" width="3000" height="3000"></canvas>

    <script src="script.js"></script>
</body>
</html>
